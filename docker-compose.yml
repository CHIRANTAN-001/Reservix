version: "3.9"

services:
  api:
    build: .
    container_name: reservix-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: python -m app.main
    restart: always

  expiry-worker:
    build: .
    container_name: reservix-expiry-worker
    env_file:
      - .env
    command: python -m app.workers.expiry_worker
    restart: always

  capacity-reconciliation-worker:
    build: .
    container_name: reservix-capacity-reconciliation-worker
    env_file:
      - .env
    command: python -m app.workers.capacity_reconciliation_worker
    restart: always