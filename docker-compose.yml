version: "3.9"

services:
  api:
    build: .
    container_name: reservix-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: python -m app.main

  worker:
    build: .
    container_name: reservix-worker
    env_file:
      - .env
    command: python -m app.workers.expiry_worker